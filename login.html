<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <title>AMK-one | Inloggen</title>
  <style>
    body{
      font-family: Arial, sans-serif;
      background:#111;
      color:#fff;
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
    }

    .login-box{
      background:#1c1c1c;
      padding:30px;
      border-radius:12px;
      width:300px;
    }

    input{
      width:100%;
      padding:10px;
      margin:10px 0;
      border:none;
      border-radius:6px;
    }

    button{
      width:100%;
      padding:10px;
      background:#fff;
      border:none;
      border-radius:6px;
      cursor:pointer;
    }

    button:hover{
      background:#ddd;
    }
  </style>
</head>
<body>

  <div class="login-box">
    <h2>Inloggen / Aanmelden</h2>

    <input type="email" placeholder="E-mail">
    <input type="password" placeholder="Wachtwoord">

    <button onclick="location.href='index.html'">
      Inloggen
    </button>

    <p style="font-size:12px; margin-top:10px;">
      Nog geen account? Aanmelden komt binnenkort.
    </p>
  </div>

</body>
</html>
